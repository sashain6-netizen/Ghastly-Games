<!DOCTYPE html>
<html itemscope itemtype="https://schema.org">
<head>
    <meta charset="UTF-8"/>
    <title>A Dark Room</title>
    <meta itemprop="description" name="description" property="og:description" content="A minimalist text adventure">
    <link rel="shortcut icon" href="favicon.ico" />
    
    <!-- FIXED: Full jQuery URL -->
    <script src="https://ajax.googleapis.com"></script>

    <!-- 1. PERMANENT LAYOUT (Always On) -->
    <link rel="stylesheet" type="text/css" href="./styles.css" />

    <!-- 2. THEME OVERLAY (Toggleable) -->
    <link rel="stylesheet" type="text/css" href="./dark.css" id="darkenLights" title="darkenLights" />

    <!-- FIXED: Safe Language Logic -->
    <script type='text/javascript'>
        var oldIE = false;
        var lang = 'en';
        try {
            var params = new URLSearchParams(window.location.search);
            lang = params.get('lang') || localStorage.getItem('lang') || 'en';
        } catch(e) { console.log("Lang error, defaulting to en"); }
    </script>
    
    <!-- Main Game Logic -->
    <script src="./script.js" defer></script>

    <!-- FIXED: Full Google Tag Manager URL -->
    <script async src="https://www.googletagmanager.com"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-606P6J79WH');
    </script>
</head>
<body>
    <div id="wrapper">
        <div id="saveNotify"></div>
        <div id="content">
            <div id="outerSlider">
                <div id="main">
                    <!-- Critical structural IDs for the UI -->
                    <div id="header"></div>
                    <div id="sidebar"></div>
                    <div id="location"></div>
                    <div id="log"></div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Logo SVG -->
    <a class="logo" href="https://www.doublespeakgames.com" target="_blank">
        <svg viewBox="0 0 41.75 32.84375" class="logo-icon" style="width:40px; height:auto; position:fixed; bottom:10px; right:10px;">

        </svg>
    </a>

    <!-- Bootloader ensures Engine.init() only runs when scripts are ready -->
    <script type="text/javascript">
        function initGame() {
            if (window.jQuery && typeof Engine !== 'undefined') {
                // If translation tool exists, show 'saved'
                if(window._) { document.getElementById("saveNotify").innerHTML = _("saved."); }
                Engine.init();
            } else {
                setTimeout(initGame, 100); 
            }
        }
        initGame();
    </script>
</body>
</html>
